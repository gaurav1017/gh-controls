name: reusable file
on: 
  workflow_call: 
    inputs:
      artifact-name: The name of deployable artifact files
      required: false
      default: dist
      type: string

jobs: 
  deploy: 
    runs-on: ubuntu latest
    steps:
      - name: get code
        uses: actions/checkout@v4
        with: 
          name: ${{inputs.artifact-name}}
      - name: list files
        run: ls     
      - name: Output information
        run: echo "Deploying & Uploading..."  